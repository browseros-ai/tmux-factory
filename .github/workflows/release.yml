name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --notes ""
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: tfmux-macos-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: tfmux-macos-x86_64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: tfmux-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: tfmux-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"

      - name: Build release binary
        run: cargo +stable build --release --target "${{ matrix.target }}"

      - name: Prepare asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tfmux" "dist/${{ matrix.asset }}"

      - name: Upload asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" "dist/${{ matrix.asset }}" --clobber
