name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: tfmux-macos-arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: tfmux-macos-x86_64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: tfmux-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: tfmux-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"

      - name: Build release binary
        run: cargo +stable build --release --target "${{ matrix.target }}"

      - name: Prepare asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tfmux" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish-release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tfmux-*
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          expected=(
            tfmux-linux-arm64
            tfmux-linux-x86_64
            tfmux-macos-arm64
            tfmux-macos-x86_64
          )

          for asset in "${expected[@]}"; do
            test -f "dist/$asset"
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --verify-tag --draft --title "$TAG" --notes ""
          fi

          gh release upload "$TAG" "${expected[@]/#/dist/}" --clobber
          gh release edit "$TAG" --draft=false --latest
